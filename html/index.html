<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بصمتك الصحية - الهوية الطبية الرقمية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f4f7f9;
            color: #334155;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background-color: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 1px solid #e2e8f0;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 15px;
        }
        .brand-logo {
            width: 150px;
            height: auto;
            margin-bottom: 10px;
        }
        .header h1 {
            font-family: 'Cairo', sans-serif;
            color: #0284c7;
            font-size: 22px;
            margin-bottom: 5px;
        }
        .header p {
            font-size: 14px;
            color: #64748b;
        }
        .info-card {
            background-color: #f8fafc;
            border-right: 5px solid #0284c7;
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        .info-title {
            font-weight: 700;
            color: #64748b;
            font-size: 13px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .info-title i {
            color: #0284c7;
        }
        .info-value {
            font-size: 16px;
            font-weight: 700;
            color: #1e293b;
        }
        .btn-call {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: #ef4444;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            text-align: center;
            margin-top: 20px;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
            transition: background-color 0.2s;
        }
        .btn-call:hover {
            background-color: #dc2626;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="logo.jpg" alt="شعار بصمتك الصحية" class="brand-logo">
            
            <p>الهوية الطبية الرقمية لحالات الطوارئ</p>
        </div>

        <div class="info-card" style="border-right-color: #0284c7;">
            <div class="info-title"><i class="fa-solid fa-user"></i>الاسم   </div>
            <div class="info-value" id="patient-name">جاري التحميل...</div>
        </div>

        <div class="info-card" style="border-right-color: #10b981;">
            <div class="info-title"><i class="fa-solid fa-droplet"></i> فصيلة الدم</div>
            <div class="info-value" id="blood-type">جاري التحميل...</div>
        </div>

        <div class="info-card" style="border-right-color: #f59e0b;">
            <div class="info-title"><i class="fa-solid fa-file-medical"></i> الأمراض المزمنة / الحالات الصحية</div>
            <div class="info-value" id="chronic-diseases">جاري التحميل...</div>
            </div>

        <div class="info-card" style="border-right-color: #6366f1;">
            <div class="info-title"><i class="fa-solid fa-address-book"></i> شخص يمكن الاتصال به عند الطوارئ</div>
            <div class="info-value" id="relative-kin">جاري التحميل...</div>
        </div>

        <a href="#" class="btn-call" id="call-link">
            <i class="fa-solid fa-phone"></i> جاري تجهيز اتصال الطوارئ...
        </a>
    </div>

<script>
    const patientsDatabase = {
        "1": { "name": "ليان محمد", "blood": "+B", "chronic": "قولون عصبي + سبق اجراء عمليه + عدم انتظام الضغط والسكر + مراجعة عند طبيب القلب", "kin": "محمد الحويطي", "phone": "0556360087" },
        "2": { "name": "مضاوي  الجزيري", "blood": "-O", "chronic": "ربو", "kin": "الاب", "phone": "0503584003" },
        "3": { "name": "البتول ناصر", "blood": "+O", "chronic": "الصرع", "kin": "ناصر الحويطي", "phone": "0506579033" },
        "4": { "name": "غزل البلوي", "blood": "+A", "chronic": "ربو", "kin": "الاخت", "phone": "0553260818" },
        "5": { "name": "العنود عبيدالله", "blood": "+O", "chronic": "كتمه والتهاب بالصدر متكرر", "kin": "نوره", "phone": "0546300312" },
        "6": { "name": "لين الحويطي", "blood": "+O", "chronic": "السكري", "kin": "عائشه سالم", "phone": "0502275005" },
        "7": { "name": "تولين  الثقفي", "blood": "+O", "chronic": "ربو", "kin": "خديجة  الثمالي", "phone": "0566344375" },
        "8": { "name": "عذاري سعود", "blood": "+A", "chronic": "السكري", "kin": "والدتها", "phone": "0550382129" },
        "9": { "name": "احلام  مرزوقي", "blood": "+A", "chronic": "روماتيد و متلازمة مضادات السنتيتيز وتليف رائوي", "kin": "عبدالله احمد", "phone": "0555377292" },
        "10": { "name": "نور علي", "blood": "+A", "chronic": "ربو حاد - الذيبه الحمرا", "kin": "الام", "phone": "0534505919" },
        "11": { "name": "هاجر محمد", "blood": "+AB", "chronic": "حساسيه من ادويه المضاد الحيوي", "kin": "جهة اتصال للطوارئ", "phone": "0501692854" },
        "12": { "name": "فوز عواد", "blood": "+O", "chronic": "السكري", "kin": "الام", "phone": "0507516850" },
        "13": { "name": "مها غازي", "blood": "+A", "chronic": "الإغماء مستمر", "kin": "روان  البلوي", "phone": "0506043279" },
        "14": { "name": "حامدة القرعاني", "blood": "-A", "chronic": "مرض السرطان", "kin": "علي احمد", "phone": "0535242526" },
        "15": { "name": "حنان عوض", "blood": "-B", "chronic": "ربو", "kin": "أخت", "phone": "0500954188" },
        "16": { "name": "ياسر غازي", "blood": "+A", "chronic": "السكري", "kin": "غازي حسين", "phone": "0557369597" },
        "17": { "name": "سويلمه محمد", "blood": "غير محدد", "chronic": "القلب جلطه في الراس", "kin": "جهة اتصال للطوارئ", "phone": "0559691924" },
        "18": { "name": "جميله", "blood": "غير محدد", "chronic": "سكري امراض القلب ضغط", "kin": "ناصر", "phone": "0557807402" },
        "19": { "name": "سليم", "blood": "غير محدد", "chronic": "سكري", "kin": "محمد", "phone": "0563590057" },
        "20": { "name": "فاطمه", "blood": "غير محدد", "chronic": "سكر", "kin": "لطيفه", "phone": "0535774598" },
        "21": { "name": "محمد البلوي", "blood": "+O", "chronic": "ربو", "kin": "سعيد", "phone": "0501688697" },
        "22": { "name": "حمده البلوي", "blood": "غير محدد", "chronic": "سكر ،ضغط", "kin": "بنتها", "phone": "0509242244" },
        "23": { "name": "سهير عبادي", "blood": "+A", "chronic": "السكري و الضغط", "kin": "ابن", "phone": "0598327518" },
        "24": { "name": "عيده محمد نصير", "blood": "غير محدد", "chronic": "ضغظ", "kin": "عيد محمد", "phone": "0553702699" },
        "25": { "name": "صالح حماد", "blood": "غير محدد", "chronic": "سكر", "kin": "ضحيه", "phone": "0591690284" },
        "26": { "name": "نوره", "blood": "+A", "chronic": "سكر", "kin": "بنتها", "phone": "0595076746" }
    };

    function getPatientId() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get('id') || "1";
    }

    const patientId = getPatientId();
    const patient = patientsDatabase[patientId];

    if (patient) {
        document.getElementById('patient-name').innerText = patient.name.
        trim();
        document.getElementById('blood-type').innerText = "فصيلة الدم: " + patient.blood;
        document.getElementById('chronic-diseases').innerText = patient.chronic;
        document.getElementById('relative-kin').innerText = patient.kin;
        
        const callBtn = document.getElementById('call-link');
        callBtn.href = "tel:" + patient.phone.trim();
        callBtn.innerHTML = `<i class="fa-solid fa-phone"></i> اتصال فوري بالطوارئ (${patient.phone.trim()})`;
    } else {
        document.getElementById('patient-name').innerText = "خطأ: مراجع غير مسجل";
        document.getElementById('blood-type').innerText = "—";
        document.getElementById('chronic-diseases').innerText = "—";
        document.getElementById('relative-kin').innerText = "—";
        document.getElementById('call-link').style.display = "none";
    }
</script>

</body>
</html>
